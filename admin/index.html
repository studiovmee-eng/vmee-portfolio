<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VMEE Admin</title>

<link rel="stylesheet" href="css/login.css">

</head>

<body>

<div class="login-box">

<div class="admin-brand">
   <img src="assets/images/logo.png" alt="VMEE" class="admin-logo">
 <span class="admin-text">admin</span>
</div>

<p>Sign in to manage your portfolio</p>

<form id="loginForm">

<input
type="email"
id="email"
placeholder="Email"
required>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password"
required>

<button
type="button"
id="togglePassword"
class="toggle-password">

👁

</button>

</div>

<button type="submit">
    Login
</button>

</form>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
