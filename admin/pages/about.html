<div class="card">

    <h2>About Section</h2>

<form id="aboutForm">

    <label>About Video</label>

    <input
        type="file"
        id="aboutVideo"
        accept="video/*">

    <div id="aboutUploadStatus" class="upload-status" style="display:none;">

        <div class="upload-spinner"></div>

        <p id="aboutUploadText">
            Uploading...
        </p>

        <div class="progress-bar">
            <div id="aboutProgressFill"></div>
        </div>

    </div>

    <button
        type="submit"
        id="aboutSaveBtn">
        Save About
    </button>

</form>

</div>
