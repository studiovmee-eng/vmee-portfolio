<div class="card">

<h2>Hero Section</h2>

<form id="heroForm">



<label>Hero Video</label>

<input
type="file"
id="heroVideo"
accept="video/*">

<div id="heroUploadStatus" class="upload-status" style="display:none;">

    <div class="upload-spinner"></div>

    <p id="heroUploadText">
        Uploading...
    </p>

    <div class="progress-bar">
        <div id="heroProgressFill"></div>
    </div>

</div>
<button type="submit" id="heroSaveBtn">
    Save Hero
</button>

</form>

</div>
